<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiAura</title>
    <!-- Modular CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="container">
        <div class="xp-content">

        <!-- Page 1: Mood Selection -->
        <div id="page1" class="page active">
            <p class="mood-title" id="mainTitle">How are you feeling today?</p>

            <div class="hero-orb-wrap" id="heroOrbWrap">
                <div class="hero-glow" id="heroGlow"></div>
                <div class="hero-orb" id="heroOrb"></div>
                <div class="particles" id="particles"></div>
            </div>

            <div class="mood-selector" id="moodSelector">
                <div class="mood-orb" data-level="1"></div>
                <div class="mood-orb" data-level="2"></div>
                <div class="mood-orb" data-level="3"></div>
                <div class="mood-orb" data-level="4"></div>
                <div class="mood-orb" data-level="5"></div>
            </div>

            <p class="mood-label" id="colorLabel"></p>
        </div>

        <!-- Page 2: Year Calendar -->
        <div id="page2" class="page">
            <div class="year-header">
                <div class="year-nav-row">
                    <div class="year-nav-container">
                        <button class="year-arrow" id="prevYear">‹</button>
                        <span id="yearDisplay">2026</span>
                        <button class="year-arrow" id="nextYear">›</button>
                    </div>
                    <span id="loggedDays">0 days</span>
                </div>
            </div>
            <div class="year-grid" id="yearGrid"></div>
            <div class="view-toggle-inline">
                <button class="view-btn-inline" data-view="week" id="viewWeek">W</button>
                <button class="view-btn-inline" data-view="month" id="viewMonth">M</button>
                <button class="view-btn-inline" data-view="year" id="viewYear">Y</button>
            </div>
        </div>

        <!-- Page 3: Settings -->
        <div id="page3" class="page">
            <h1 id="settingsTitle">Settings</h1>

            <div class="settings-section settings-compact">
                <div class="settings-row">
                    <span class="settings-label" id="counterModeLabel">Counter</span>
                    <div class="view-toggle">
                        <button class="view-btn" data-mode="streak" id="streakBtn">
                            <span id="streakTitle">Streak</span>
                        </button>
                        <button class="view-btn" data-mode="total" id="totalBtn">
                            <span id="totalTitle">Total</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="settings-section settings-compact">
                <div class="settings-row">
                    <span class="settings-label" id="languageLabel">Language</span>
                    <select class="settings-select" id="languageSelect">
                        <option value="en">English</option>
                        <option value="fr">Francais</option>
                        <option value="pt">Portugues</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h2 id="exportLabel">Data Export</h2>
                <div class="coming-soon" id="exportComingSoon">Coming Soon</div>
            </div>

            <div class="settings-section test-section">
                <h2 id="testModeLabel">Test Mode</h2>
                <div class="test-controls">
                    <input type="number" id="testStreakInput" min="1" max="365" value="7" class="test-input">
                    <button class="test-btn" id="setTestStreak">Set</button>
                    <button class="test-btn test-btn-clear" id="clearTestStreak">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="vista-nav">
        <div class="nav-item active" id="navToday">
            <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="11" cy="11" r="2.5" fill="currentColor"/>
                </svg>
            </div>
        </div>
        <div class="nav-item" id="navCalendar">
            <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
                    <circle cx="11" cy="7" r="1.5" fill="currentColor"/>
                    <circle cx="15" cy="7" r="1.5" fill="currentColor"/>
                    <circle cx="7" cy="11" r="1.5" fill="currentColor"/>
                    <circle cx="11" cy="11" r="1.5" fill="currentColor"/>
                    <circle cx="15" cy="11" r="1.5" fill="currentColor"/>
                    <circle cx="7" cy="15" r="1.5" fill="currentColor"/>
                    <circle cx="11" cy="15" r="1.5" fill="currentColor"/>
                    <circle cx="15" cy="15" r="1.5" fill="currentColor"/>
                </svg>
            </div>
        </div>
        <div class="nav-item" id="navSettings">
            <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="5" y1="8" x2="17" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="9" cy="8" r="2.5" fill="rgba(100, 155, 150, 0.9)" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="5" y1="14" x2="17" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="14" cy="14" r="2.5" fill="rgba(100, 155, 150, 0.9)" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
